version: "3.8"

services:
  medspa:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: medspa-consultation
    restart: always
    ports:
      - "${APP_PORT:-15000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/medspa.db
      - JWT_SECRET=${JWT_SECRET:-change-me-to-a-random-secret-key}
    volumes:
      - medspa_data:/app/data
      - medspa_uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/auth/session"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  medspa_data:
    driver: local
  medspa_uploads:
    driver: local
