services:
  medspa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medspa-consultation
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/data/medspa.db
      PORT: 3000
      HOSTNAME: 0.0.0.0
      RUN_SEED: ${RUN_SEED:-true}
    ports:
      - "${APP_PORT:-15000}:3000"
    volumes:
      - medspa_data:/app/data
      - medspa_uploads:/app/public/uploads
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/auth/session"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  medspa_data:
  medspa_uploads:
